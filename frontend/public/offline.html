<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOS Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; background: #f7f8fb; color: #111827; }
      main { max-width: 420px; padding: 32px; text-align: center; }
      .logo { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center; margin: 0 auto 18px; background: #4f46e5; color: white; font-weight: 800; }
      p { color: #64748b; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">L</div>
      <h1>You’re offline</h1>
      <p>LifeOS is installed, but this screen needs a connection before it can sync your latest data.</p>
    </main>
  </body>
</html>
